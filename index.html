<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Ensueño</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<link rel="stylesheet" href="./css/main.css">

</head>

<body>

<script>

let sesion = localStorage.getItem("sesion");

if(!sesion){
window.location.href="login.html";
}

</script>

<div class="wrapper">

<aside>

<header>

<h1 class="logo">Tienda de Ensueño</h1>

<div id="usuario-info" style="margin-top:10px;font-weight:bold;"></div>

</header>

<nav>

<ul class="menu">

<li id="menu-login1">
<a class="boton-menu" href="login.html">
<i class="bi bi-person"></i> Iniciar sesión
</a>
</li>

<li id="menu-login2">
<a class="boton-menu" href="registro.html">
<i class="bi bi-person-plus"></i> Registrarse
</a>
</li>

<li class="menu-tienda" style="display:none;">
<button id="todos" class="boton-menu boton-categoria active">
<i class="bi bi-hand-index-thumb-fill"></i> Todos los productos
</button>
</li>

<li class="menu-tienda" style="display:none;">
<button id="abrigos" class="boton-menu boton-categoria">
<i class="bi bi-hand-index-thumb"></i> Abrigos
</button>
</li>

<li class="menu-tienda" style="display:none;">
<button id="camisetas" class="boton-menu boton-categoria">
<i class="bi bi-hand-index-thumb"></i> Camisetas
</button>
</li>

<li class="menu-tienda" style="display:none;">
<button id="pantalones" class="boton-menu boton-categoria">
<i class="bi bi-hand-index-thumb"></i> Pantalones
</button>
</li>

<li class="menu-tienda" style="display:none;">
<a class="boton-menu boton-carrito" href="./carrito.html">
<i class="bi bi-cart-fill"></i> Carrito
<span id="numerito" class="numerito">0</span>
</a>
</li>

<li class="menu-tienda" style="display:none;">
<button class="boton-menu" onclick="cerrarSesion()">
<i class="bi bi-box-arrow-right"></i> Cerrar sesión
</button>
</li>

</ul>

</nav>

<footer>
<p class="texto-footer"></p>
</footer>

</aside>

<main>

<h2 class="titulo-principal" id="titulo-principal">
Todos los productos
</h2>

<div id="contenedor-productos" class="contenedor-productos">
</div>

</main>

</div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="./js/main.js"></script>
<script src="./js/menu.js"></script>

<script>

let usuario = JSON.parse(localStorage.getItem("usuario"));

let menuLogin1 = document.getElementById("menu-login1");
let menuLogin2 = document.getElementById("menu-login2");
let menuTienda = document.querySelectorAll(".menu-tienda");

if(sesion){

menuLogin1.style.display="none";
menuLogin2.style.display="none";

menuTienda.forEach(item=>{
item.style.display="block";
});

if(usuario){
document.getElementById("usuario-info").innerText="Hola " + usuario.nombre;
}

}

function cerrarSesion(){

localStorage.removeItem("sesion");

alert("Sesión cerrada");

window.location.href="login.html";

}

</script>

</body>
</html>
