<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="./css/main.css">
</head>

<body>

<h2>Registro</h2>

<form id="registroForm">

<input type="text" id="nombre" placeholder="Nombre" required><br><br>

<input type="email" id="email" placeholder="Correo" required><br><br>

<input type="password" id="password" placeholder="Contraseña" required><br><br>

<button type="submit">Registrarse</button>

</form>

<p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>

<script>

document.getElementById("registroForm").addEventListener("submit", function(e){

e.preventDefault();

let nombre = document.getElementById("nombre").value.trim();
let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

if(nombre === "" || email === "" || password === ""){
alert("Por favor completa todos los campos");
return;
}

let usuario = {
nombre: nombre,
email: email,
password: password
};

localStorage.setItem("usuario", JSON.stringify(usuario));

alert("Registro exitoso");

window.location.href = "login.html";

});

</script>

</body>
</html>
